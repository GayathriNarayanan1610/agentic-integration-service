services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentic
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      LLM_MODE: ${LLM_MODE:-mock}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/agentic
      HIGH_VALUE_THRESHOLD: ${HIGH_VALUE_THRESHOLD:-10000}
      # Uncomment + set these (and LLM_MODE=azure) to use a real model:
      # AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      # AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      # AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT}
    ports:
      - "8000:8000"

volumes:
  pgdata:
